<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Monitor FPT Beach 2026 — Inscrições, Realização & Academias</title>
<style>
:root{--t1000:#16a34a;--t1500:#0284c7;--t2000:#f59e0b;--t2500:#9333ea;
--ink:#0f2733;--ink2:#496575;--line:#e3ecf1;--card:#fff;--bg:#eef5f9}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.45}
.hero{background:linear-gradient(120deg,#0c4a6e,#0891b2 60%,#f0b429 150%);color:#fff;padding:24px 20px}
.wrap{max-width:1240px;margin:0 auto}
.hero h1{margin:4px 0 2px;font-size:24px}.hero .logo{font-weight:800;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;opacity:.9}
.hero .sub{font-size:13px;opacity:.92;margin:0}
.kpis{max-width:1240px;margin:-16px auto 0;padding:0 20px;display:grid;grid-template-columns:repeat(6,1fr);gap:11px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;box-shadow:0 6px 16px rgba(12,74,110,.06)}
.kpi .n{font-size:22px;font-weight:800}.kpi .l{font-size:10.5px;color:var(--ink2);margin-top:4px;text-transform:uppercase;letter-spacing:.3px}
.tabs{max-width:1240px;margin:16px auto 0;padding:0 20px;display:flex;gap:6px;flex-wrap:wrap}
.tabs button{border:1px solid var(--line);background:#fff;color:var(--ink2);padding:9px 14px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer}
.tabs button.active{background:var(--ink);color:#fff;border-color:var(--ink)}
.filters{max-width:1240px;margin:13px auto 0;padding:11px 13px;display:flex;gap:9px;flex-wrap:wrap;align-items:center;background:#fff;border:1px solid var(--line);border-radius:13px;position:sticky;top:6px;z-index:30;box-shadow:0 4px 12px rgba(12,74,110,.05)}
.chip{border:1px solid var(--line);background:#fff;padding:6px 11px;border-radius:999px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink2)}
.chip[data-on="1"]{color:#fff}.chip.t1000[data-on="1"]{background:var(--t1000);border-color:var(--t1000)}.chip.t1500[data-on="1"]{background:var(--t1500);border-color:var(--t1500)}.chip.t2000[data-on="1"]{background:var(--t2000);border-color:var(--t2000)}.chip.t2500[data-on="1"]{background:var(--t2500);border-color:var(--t2500)}.chip.tall[data-on="1"]{background:var(--ink);border-color:var(--ink)}
select,input[type=search]{border:1px solid var(--line);border-radius:9px;padding:7px 9px;font-size:13px;background:#fff;color:var(--ink)}
input[type=search]{min-width:150px}
.btn{border:1px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:700;cursor:pointer;color:var(--ink2)}
main{max-width:1240px;margin:16px auto 60px;padding:0 20px}
.count{font-size:13px;color:var(--ink2);margin:2px 2px 12px}.count b{color:var(--ink)}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.card h3{margin:0 0 12px;font-size:15px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}@media(max-width:880px){.grid2{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(3,1fr)}}@media(max-width:520px){.kpis{grid-template-columns:repeat(2,1fr)}}
.bar{display:flex;align-items:center;gap:9px;margin:6px 0;font-size:12.5px}.bar .lab{width:150px;flex:none;color:var(--ink2);font-weight:600;text-align:right}.bar .track{flex:1;background:#eef3f6;border-radius:6px;overflow:hidden;height:20px}.bar .fill{height:100%;border-radius:6px}.bar .val{width:54px;text-align:right;font-weight:700}
.note{font-size:12px;color:var(--ink2);background:#f0f7fb;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12.5px;background:#fff}
.tablewrap.scrollbox thead th{position:sticky;top:0;z-index:2}
thead th{position:static;background:#f7fbfd;text-align:left;padding:8px 9px;border-bottom:2px solid var(--line);font-size:11px;text-transform:uppercase;letter-spacing:.3px;color:var(--ink2);cursor:pointer;white-space:nowrap}
tbody td{padding:7px 9px;border-bottom:1px solid var(--line);vertical-align:middle}tbody tr:hover{background:#f6fafc}
.tablewrap{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:auto}
.tg{display:inline-block;font-size:10px;font-weight:800;color:#fff;padding:2px 7px;border-radius:5px}
.rb{display:inline-block;font-size:11px;font-weight:800;color:#fff;width:22px;text-align:center;border-radius:5px;padding:2px 0}
.st{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:999px}
.st.realizado{background:#d4efdf;color:#1e8449}.st.cancelado{background:#fadbd8;color:#c0392b}.st.aberta{background:#fcf3cf;color:#9a7d0a}.st.agendado{background:#fdebd0;color:#ca6f1e}.st.nao{background:#fadbd8;color:#c0392b}
.catwrap{display:none;padding:8px 10px;background:#f8fbfd}.catwrap.open{display:block}
.catchip{display:inline-block;background:#eef3f6;border:1px solid var(--line);border-radius:7px;padding:2px 8px;margin:2px;font-size:11px}.catchip b{color:var(--ink)}
.link{color:#0563c1;text-decoration:none;font-weight:700;font-size:11px}
.foot{max-width:1240px;margin:0 auto 50px;padding:0 20px;font-size:11.5px;color:var(--ink2)}
.hidden{display:none!important}
.split{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}@media(max-width:760px){.split{grid-template-columns:1fr}}
.acadcard{background:#fff;border:1px solid var(--line);border-radius:13px;padding:12px 14px}
.acadcard .h{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px;margin-bottom:9px}
.arow{display:flex;align-items:center;gap:8px;margin:5px 0;font-size:12px}
.arow .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.arow .tk{flex:none;width:120px;background:#eef3f6;border-radius:6px;height:16px;overflow:hidden}
.arow .fl{height:100%;border-radius:6px}
.arow .vv{flex:none;width:96px;text-align:right;font-weight:700}
.arow.win .nm{font-weight:800}
.medal{font-size:13px}
.acadgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:820px){.acadgrid{grid-template-columns:1fr}}
.modebtns{display:flex;gap:6px;margin-left:auto}
.modebtns button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:4px 9px;font-size:11.5px;font-weight:700;color:var(--ink2);cursor:pointer}
.modebtns button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
</style></head><body>

 document.getElementById('foot').innerHTML="Fonte: páginas de Inscritos de cada torneio (link na aba Torneios). 113/114 conferem (soma das categorias = total). Sinalizados: nº6, nº232 (inconsistência do site) e nº31 (participantes n/d). Participantes* = soma por torneio (não desduplicada). Academia = arena/clube que sedia; variações do nome da mesma arena foram unificadas.";
}
function barRow(lab,val,max,color,suffix){return `<div class="bar"><div class="lab">${lab}</div><div class="track"><div class="fill" style="width:${max?val/max*100:0}%;background:${color}"></div></div><div class="val">${fmt(val)}${suffix||""}</div></div>`;}
function overview(arr){
 let pi={},rins={},typ={},stc={};for(let m=1;m<=12;m++)pi[m]=0;
 arr.forEach(t=>{pi[mnum(t)]=(pi[mnum(t)]||0)+t.total_inscricoes;rins[t.regiao]=(rins[t.regiao]||0)+t.total_inscricoes;typ[t.tipo]=(typ[t.tipo]||0)+t.total_inscricoes;const c=stCls(t.status_realizacao);stc[c]=(stc[c]||0)+1;});
 let mx=Math.max(1,...Object.values(pi)),monB=[];for(let m=1;m<=12;m++)if(pi[m])monB.push(barRow(MESF[m],pi[m],mx,"#0284c7"));
 let mxr=Math.max(1,...Object.values(rins)),regB=[41,42,43,44,45,46].map(r=>barRow(`<span class="rb" style="background:${RCOL[r]}">${r}</span> ${REG[r]}`,rins[r]||0,mxr,RCOL[r]));
 let mxt=Math.max(1,...Object.values(typ)),typB=Object.keys(TYPES).map(k=>typ[k]?barRow(TYPES[k].l,typ[k],mxt,TYPES[k].hex):"").join("");
 const stColors={realizado:"#16a34a",aberta:"#f59e0b",cancelado:"#ef4444",agendado:"#e67e22",nao:"#c0392b"},stLabels={realizado:"Realizados",aberta:"Inscrições abertas",cancelado:"Cancelados",agendado:"Agendados",nao:"Não realizados"};
 let mxs=Math.max(1,...Object.values(stc)),stB=Object.keys(stc).map(k=>barRow(stLabels[k]||k,stc[k],mxs,stColors[k]||"#888")).join("");
 document.getElementById('overview').innerHTML=`<div class="note">Inscrições = nº de duplas/atletas por categoria; Participantes = atletas distintos. Números do rodapé de cada página de Inscritos.</div>
 <div class="grid2"><div class="card"><h3>Inscrições por mês</h3>${monB.join("")||"—"}</div><div class="card"><h3>Inscrições por região</h3>${regB.join("")}</div></div>
 <div class="grid2"><div class="card"><h3>Inscrições por tipo</h3>${typB}</div><div class="card"><h3>Status de realização</h3>${stB}</div></div>`;
}
function realiz(arr){
 let pm=DATA.plan_month,sm={},rm={},im={};for(let m=1;m<=12;m++){sm[m]=0;rm[m]=0;im[m]=0;}
 T.forEach(t=>{const m=mnum(t);sm[m]++;if(isReal(t)){rm[m]++;im[m]+=t.total_inscricoes;}});
 let rows="";for(let m=1;m<=12;m++)rows+=`<tr><td>${MESF[m]}</td><td style="text-align:center">${pm[m]||0}</td><td style="text-align:center">${sm[m]||0}</td><td style="text-align:center;font-weight:700;color:#16a34a">${rm[m]||0}</td><td style="text-align:right;font-weight:700">${fmt(im[m]||0)}</td></tr>`;
 let pt=Object.values(pm).reduce((a,b)=>a+b,0),s2=Object.values(sm).reduce((a,b)=>a+b,0),rt=Object.values(rm).reduce((a,b)=>a+b,0),it=Object.values(im).reduce((a,b)=>a+b,0);
 let regrows=[41,42,43,44,45,46].map(r=>{const rg=T.filter(t=>t.regiao==r);const rr=rg.filter(isReal);const iv=rr.reduce((s,t)=>s+t.total_inscricoes,0);return `<tr><td><span class="rb" style="background:${RCOL[r]}">${r}</span> ${REG[r]}</td><td style="text-align:center">${rg.length}</td><td style="text-align:center;color:#16a34a;font-weight:700">${rr.length}</td><td style="text-align:right;font-weight:700">${fmt(iv)}</td></tr>`;}).join("");
 let exc=T.filter(t=>t.cancelado||stCls(t.status_realizacao)==='nao').map(t=>`<tr><td>${t.numero}</td><td><span class="tg" style="background:${TYPES[t.tipo].hex}">${t.tipo}</span></td><td>${esc(t.arena)} · ${esc(t.cidade)}</td><td>${t.data_inicio||""}</td><td><span class="st ${stCls(t.status_realizacao)}">${t.cancelado?'Cancelado':'Não realizado'}</span></td></tr>`).join("");
 document.getElementById('realiz').innerHTML=`<div class="note">Calendário oficial projeta <b>${DATA.plan_total}</b> torneios; o site tem <b>${T.length}</b> (jan–jul). Ago–dez ainda não cadastrados. "Realizado" = chave publicada. <b>Inscrições (realiz.)</b> = soma das inscrições só dos torneios realizados.</div>
 <div class="grid2"><div class="card"><h3>Por mês — planejado × cadastrado × realizado</h3><div class="tablewrap"><table><thead><tr><th>Mês</th><th>Planej.</th><th>Cadastr.</th><th>Realiz.</th><th style="text-align:right">Inscr. (realiz.)</th></tr></thead><tbody>${rows}<tr style="font-weight:800"><td>TOTAL</td><td style="text-align:center">${pt}</td><td style="text-align:center">${s2}</td><td style="text-align:center">${rt}</td><td style="text-align:right">${fmt(it)}</td></tr></tbody></table></div></div>
 <div class="card"><h3>Por região</h3><div class="tablewrap"><table><thead><tr><th>Região</th><th>Cadastr.</th><th>Realiz.</th><th style="text-align:right">Inscr. (realiz.)</th></tr></thead><tbody>${regrows}</tbody></table></div>
 <h3 style="margin-top:16px">Exceções</h3><div class="tablewrap"><table><thead><tr><th>Nº</th><th>Tipo</th><th>Local</th><th>Data</th><th>Situação</th></tr></thead><tbody>${exc||'<tr><td colspan=5>—</td></tr>'}</tbody></table></div></div></div>`;
}
function acadView(arr){
 const g={};
 arr.forEach(t=>{const k=t.acad_key||t.arena;(g[k]=g[k]||{nome:t.academia||t.arena,cid:t.acad_cidade||t.cidade,reg:t.regiao,n:0,insc:0});const a=g[k];a.n++;a.insc+=t.total_inscricoes;});
 let acs=Object.values(g);
 const sk=(st.acadSort&&st.acadSort.key)||'insc', sd=(st.acadSort&&st.acadSort.dir)||-1;
 const val=a=>sk==='n'?a.n:sk==='media'?a.insc/a.n:a.insc;
 const cmpA=(a,b)=>((val(a)-val(b))*sd)||(b.insc-a.insc);
 const ar=k=>sk===k?(sd<0?' ▼':' ▲'):'';
 let est=acs.slice().sort(cmpA);
 let estRows=est.map((a,i)=>`<tr><td style="text-align:center;color:var(--ink2);font-weight:700">${i+1}</td><td><span class="rb" style="background:${RCOL[a.reg]}">${a.reg}</span> <b>${esc(a.nome)}</b> <span style="color:var(--ink2);font-size:11px">· ${esc(a.cid)}</span></td><td style="text-align:center">${a.n}</td><td style="text-align:right;font-weight:700">${fmt(a.insc)}</td><td style="text-align:right">${fmt(Math.round(a.insc/a.n))}</td></tr>`).join("");
 let estTable=`<div class="card"><h3>Ranking estadual — todas as academias (${est.length})</h3><div class="tablewrap scrollbox" style="max-height:460px"><table><thead><tr><th style="text-align:center">#</th><th>Academia</th><th data-ak="n" style="text-align:center;cursor:pointer">Torneios${ar('n')}</th><th data-ak="insc" style="text-align:right;cursor:pointer">Inscrições${ar('insc')}</th><th data-ak="media" style="text-align:right;cursor:pointer">Média/torn.${ar('media')}</th></tr></thead><tbody>${estRows}</tbody></table></div></div>`;
 let cards=[41,42,43,44,45,46].map(r=>{
   let rr=acs.filter(a=>a.reg===r).sort(cmpA);
   if(!rr.length)return "";
   let head=`<div class="arow" style="font-size:10px;color:var(--ink2);text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--line);padding-bottom:4px"><div class="nm">Academia</div><div data-ak="n" style="width:54px;text-align:center;flex:none;cursor:pointer">Torn.${ar('n')}</div><div data-ak="insc" style="width:74px;text-align:right;flex:none;cursor:pointer">Inscr.${ar('insc')}</div><div data-ak="media" style="width:70px;text-align:right;flex:none;cursor:pointer">Méd.${ar('media')}</div></div>`;
   let rows=rr.map(a=>`<div class="arow"><div class="nm" title="${esc(a.nome)} (${esc(a.cid)})">${esc(a.nome)}<div style="font-size:10px;color:#9bb">${esc(a.cid)}</div></div><div style="width:54px;text-align:center;flex:none">${a.n}</div><div style="width:74px;text-align:right;flex:none;font-weight:700">${fmt(a.insc)}</div><div style="width:70px;text-align:right;flex:none">${fmt(Math.round(a.insc/a.n))}</div></div>`).join("");
   return `<div class="acadcard"><div class="h"><span class="rb" style="background:${RCOL[r]}">${r}</span> ${REG[r]} <span style="font-weight:400;color:var(--ink2);font-size:11px">· ${rr.length} academias</span></div>${head}${rows}</div>`;
 }).join("");
 document.getElementById('acad').innerHTML=`<div class="note">Por academia (arena/clube que sedia): número de torneios, total de inscrições e média por torneio. <b>Clique em Torneios, Inscrições ou Média</b> para reordenar (clique de novo inverte). Reage aos filtros acima.</div>`+estTable+`<h3 style="margin:6px 2px 10px;font-size:15px">Por região</h3><div class="acadgrid">${cards}</div>`;
 document.querySelectorAll('#acad [data-ak]').forEach(el=>el.onclick=()=>{const k=el.dataset.ak;const same=st.acadSort&&st.acadSort.key===k;st.acadSort={key:k,dir:same?-(st.acadSort.dir):-1};acadView(filt());});
}

function torneios(arr){
 const head=[["data","Datas"],["tipo","Tipo"],["reg","Reg"],["","Academia / Arena"],["","Status"],["insc","Insc."],["part","Part."],["","Cat."],["","Fonte"]];
 let h=head.map(c=>`<th ${c[0]?`data-k="${c[0]}"`:""}>${c[1]}${st.sortk===c[0]&&c[0]?(st.sortd>0?" ▲":" ▼"):""}</th>`).join("");
 let rows=arr.map((t,idx)=>{const ty=TYPES[t.tipo];const cats=Object.entries(t.categorias).sort((a,b)=>b[1]-a[1]).map(([c,v])=>`<span class="catchip" title="${esc(DESC[c]||c)}">${c} <b>${v}</b></span>`).join("");
  return `<tr data-i="${idx}" style="cursor:pointer"><td style="white-space:nowrap">${t.data_inicio?t.data_inicio.split('-').reverse().slice(0,2).join('/'):'—'}<div style="font-size:10px;color:var(--ink2)">${t.mes}</div></td>
  <td><span class="tg" style="background:${ty.hex}">${t.tipo}</span></td><td><span class="rb" style="background:${RCOL[t.regiao]}">${t.regiao}</span></td>
  <td><b>${esc(t.academia||t.arena)}</b><div style="font-size:11px;color:var(--ink2)">${esc(t.cidade||"")}</div></td>
  <td><span class="st ${stCls(t.status_realizacao)}">${esc(t.status_realizacao)}</span></td>
  <td style="text-align:right;font-weight:700">${fmt(t.total_inscricoes)}</td><td style="text-align:right">${t.total_participantes?fmt(t.total_participantes):'<span style=color:#bbb>n/d</span>'}</td>
  <td style="text-align:center;color:var(--ink2)">${Object.keys(t.categorias).length}</td>
  <td><a class="link" href="${t.url_inscritos}" target="_blank" rel="noopener" onclick="event.stopPropagation()">abrir</a></td></tr>
  <tr class="catrow"><td colspan="9" style="padding:0"><div class="catwrap" id="cw${idx}">${cats||'<span style=color:#999>sem inscrições</span>'}</div></td></tr>`;}).join("");
 document.getElementById('torneios').innerHTML=`<div class="note">Clique numa linha para ver a quebra por categoria. Ordene pelos cabeçalhos.</div><div class="tablewrap"><table><thead><tr>${h}</tr></thead><tbody>${rows}</tbody></table></div>`;
 document.querySelectorAll('#torneios th[data-k]').forEach(th=>th.onclick=()=>{const k=th.dataset.k;if(st.sortk===k)st.sortd*=-1;else{st.sortk=k;st.sortd=(k==='insc'||k==='part')?-1:1;}render();});
 document.querySelectorAll('#torneios tbody tr[data-i]').forEach(tr=>tr.onclick=()=>document.getElementById('cw'+tr.dataset.i).classList.toggle('open'));
}
function catView(arr){
 let agg={};CODES.forEach(c=>agg[c]=0);arr.forEach(t=>{for(const[c,v]of Object.entries(t.categorias))agg[c]+=v;});
 const groups={"Masculinas":CODES.filter(c=>/^BTM($|[0-9A-E]|S)/.test(c)&&!c.startsWith("BTMI")&&!c.startsWith("BTSUB")),"Femininas":CODES.filter(c=>c.startsWith("BTF")),"Mistas & outras":CODES.filter(c=>c.startsWith("BTMI")||c==="BTS10"||c.startsWith("BTSUB"))};
 let mx=Math.max(1,...Object.values(agg));
 let cols=Object.entries(groups).map(([g,cs])=>`<div class="card"><h4 style="margin:4px 0 8px;font-size:12.5px;color:var(--ink2);text-transform:uppercase;letter-spacing:.4px">${g}</h4>`+cs.map(c=>`<div class="bar"><div class="lab" style="width:118px">${c}<div style="font-size:9px;color:#9bb;font-weight:400">${esc(DESC[c]||"")}</div></div><div class="track"><div class="fill" style="width:${agg[c]/mx*100}%;background:#0891b2"></div></div><div class="val">${fmt(agg[c])}</div></div>`).join("")+`</div>`).join("");
 const top=Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([c,v])=>`${c} (${fmt(v)})`).join(" · ");
 document.getElementById('cat').innerHTML=`<div class="note">Inscrições por categoria (torneios filtrados). Mais procuradas: <b>${top}</b>.</div><div class="split">${cols}</div>`;
}
function filtPlan(){return PLAN.filter(p=>{
 if(st.types.size&&!st.types.has(String(p.t)))return false;
 if(st.reg!=="all"&&p.r!=+st.reg)return false;
 if(st.mes!=="all"&&(p.ds?+p.ds.split("-")[1]:0)!=+st.mes)return false;
 if(st.q){const s=((p.c||"")+" "+(p.a||"")).toLowerCase();if(!s.includes(st.q.toLowerCase()))return false;}
 return true;});}
const TPLAN={1000:"#16a34a",1500:"#0284c7",2000:"#f59e0b",2500:"#9333ea"};
function renderPlan(){
 const arr=filtPlan();
 let cards=[41,42,43,44,45,46].map(r=>{
   let rr=arr.filter(p=>p.r===r).sort((a,b)=>(a.ds||"").localeCompare(b.ds||""));
   if(!rr.length)return "";
   let rows=rr.map(p=>{const dd=p.ds?p.ds.split('-').reverse().slice(0,2).join('/'):'';
     return `<div class="arow"><div style="width:52px;flex:none;font-size:11px;color:var(--ink2)">${dd}<div style="font-size:9px">sem ${p.w||''}</div></div><div style="width:7px;flex:none;align-self:stretch;border-radius:4px;background:${TPLAN[p.t]}"></div><div class="nm" title="${esc(p.a||'')} (${esc(p.c||'')})">${esc(p.a||'')}${p.av?' <span style="color:#9bb">(a definir)</span>':''}<div style="font-size:10px;color:#9bb">${esc(p.c||'')}</div></div><div style="width:50px;flex:none;text-align:right"><span class="tg" style="background:${TPLAN[p.t]}">${p.t}</span></div><div style="width:24px;flex:none;text-align:center;color:var(--ink2);font-size:11px" title="marcador do calendário">${p.mk||''}</div></div>`;}).join("");
   return `<div class="acadcard"><div class="h"><span class="rb" style="background:${RCOL[r]}">${r}</span> ${REG[r]} <span style="font-weight:400;color:var(--ink2);font-size:11px">· ${rr.length} torneios</span></div>${rows}</div>`;
 }).join("");
 document.getElementById('plan').innerHTML=`<div class="note">Calendário <b>planejado</b> de 2026 (fonte: calendário oficial FPT): ${arr.length} torneios dos 4 tipos, por região. Inclui ago–dez, que ainda não estão cadastrados no site. <b>P/C</b> = marcador do calendário (etapa principal/complementar). Use os filtros de tipo, região e mês.</div><div class="acadgrid">${cards}</div>`;
}
function render(){const arr=filt();
 document.getElementById('count').innerHTML=`<b>${arr.length}</b> de ${T.length} torneios`+((st.types.size||st.reg!=="all"||st.mes!=="all"||st.status!=="all"||st.q)?" (filtrado)":"");
 kpis(arr);overview(arr);realiz(arr);renderPlan();acadView(arr);torneios(arr);catView(arr);}
function show(tab){st.tab=tab;["overview","realiz","plan","acad","torneios","cat"].forEach(s=>document.getElementById(s).classList.toggle("hidden",s!==tab));document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));}
(function(){let r='<option value="all">Todas as regiões</option>';for(let x=41;x<=46;x++)r+=`<option value="${x}">Região ${x} · ${REG[x]}</option>`;document.getElementById('freg').innerHTML=r;
 let m='<option value="all">Todos os meses</option>';for(let x=1;x<=12;x++)m+=`<option value="${x}">${MESF[x]}</option>`;document.getElementById('fmes').innerHTML=m;
 document.getElementById('fstatus').innerHTML='<option value="all">Todos os status</option><option value="realizado">Realizado</option><option value="aberta">Inscrições abertas</option><option value="agendado">Agendado</option><option value="cancelado">Cancelado</option><option value="nao">Não realizado</option>';})();
document.getElementById('typechips').querySelectorAll('.chip').forEach(c=>c.onclick=()=>{const t=c.dataset.t;if(t==='all')st.types.clear();else st.types.has(t)?st.types.delete(t):st.types.add(t);document.querySelector('#typechips [data-t="all"]').dataset.on=st.types.size?0:1;document.querySelectorAll('#typechips .chip').forEach(x=>{if(x.dataset.t!=='all')x.dataset.on=st.types.has(x.dataset.t)?1:0;});render();});
freg.onchange=e=>{st.reg=e.target.value;render();};fmes.onchange=e=>{st.mes=e.target.value;render();};fstatus.onchange=e=>{st.status=e.target.value;render();};fq.oninput=e=>{st.q=e.target.value;render();};
freset.onclick=()=>{st={types:new Set(),reg:"all",mes:"all",status:"all",q:"",tab:st.tab,sortk:"data",sortd:1,acadmode:"indice"};freg.value="all";fmes.value="all";fstatus.value="all";fq.value="";document.querySelectorAll('#typechips .chip').forEach(x=>x.dataset.on=x.dataset.t==='all'?1:0);render();};
document.querySelectorAll('#tabs button').forEach(b=>b.onclick=()=>show(b.dataset.tab));
show('overview');render();
</script></body></html>
